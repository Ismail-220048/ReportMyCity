<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Workflow - CitizenConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="officer.css">
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="top-nav">
            <div class="logo"><i class="fa-solid fa-shield-halved"></i> CitizenConnect Admin</div>
            <nav class="top-menu">
                <a href="officer.html"><i class="fa-solid fa-briefcase"></i> Dashboard</a>
                <a href="officer-omplaints.html"><i class="fa-solid fa-users"></i> Manage Complaints</a>
                <a href="officer-analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
            </nav>
            <div class="top-right">
                <span class="time" id="currentTime"><i class="fa-regular fa-clock"></i> ...</span>
                <div class="user-profile-sm"><img src="https://i.pravatar.cc/150" alt="Profile" id="navPhoto"></div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="user-profile-lg">
                    <img src="https://i.pravatar.cc/150" alt="Profile" id="sidePhoto">
                    <div class="user-info">
                        <h3 id="sideName">Officer</h3>
                        <p id="sideId">ID: ...</p>
                    </div>
                </div>
                <nav class="side-menu">
                    <a href="officer.html"><i class="fa-solid fa-briefcase"></i> Dashboard</a>
                    <a href="officer-omplaints.html"><i class="fa-solid fa-users"></i> Manage Complaints</a>
                    <a href="officer-analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
                    <a href="officer-workflow.html" class="active"><i class="fa-solid fa-clipboard-check"></i> Officer Workflow</a>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="content-area">
                <div class="welcome-section" style="margin-bottom: 20px;">
                    <h1>Current Workflow Timeline</h1>
                    <p style="color: #94a3b8; font-size:0.95rem;">Prioritize open issues based on their assignment and age.</p>
                </div>

                <div class="timeline" id="workflowTimeline">
                    <!-- Populated dynamically -->
                    <div style="margin-left:50px;"><i class="fa-solid fa-spinner fa-spin"></i> Fetching Workflow...</div>
                </div>
            </main>
        </div>
    </div>
    <script src="officer.js"></script>
</body>
</html>

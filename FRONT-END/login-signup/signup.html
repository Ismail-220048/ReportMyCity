<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - CivicTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #05061a;
    overflow: hidden;
    color: white;
}
#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

.container {
    width: 1000px;
    height: 600px;
    display: flex;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 20px rgba(123,108,255,0.2);
    border: 1px solid rgba(255,255,255,0.1);
}

.left {
    flex: 1;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(123, 108, 255, 0.1));
    border-right: 1px solid rgba(255, 255, 255, 0.1);
}
.left h1 { font-size:48px; margin-bottom:20px; font-weight:700; text-shadow: 0 0 20px rgba(56,189,248,0.8); }
.left p { font-size:16px; opacity:0.8; line-height:1.6; }

.right {
    flex: 1.2;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}
.right h2 { margin-bottom:30px; font-size:32px; text-align:center; color:#38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }

.input-box { margin-bottom:20px; }
.input-box input {
    width: 100%;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    border-radius: 10px;
    transition: 0.3s;
}
.input-box input:focus { border-color:#38bdf8; background:rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(56,189,248,0.2); }

button {
    width: 100%;
    padding: 16px;
    border: none;
    background: linear-gradient(45deg, #7b6cff, #38bdf8);
    color: white;
    font-weight: 700;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 5px 20px rgba(123,108,255,0.3);
}
button:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(56,189,248,0.5); }

.signup { text-align:center; margin-top:25px; font-size:14px; color:#94a3b8; }
.signup a { color:#38bdf8; text-decoration:none; font-weight:600; }

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
  <div class="left">
    <h1>Join Us</h1>
    <p>Become part of the solution. Register now to report infrastructure issues and help build a better, cleaner city for everyone.</p>
  </div>

  <div class="right">
    <h2>Create Account</h2>
    <div class="input-box">
      <input type="text" id="fname" placeholder="First Name">
    </div>
    <div class="input-box">
      <input type="text" id="lname" placeholder="Last Name">
    </div>
    <div class="input-box">
      <input type="tel" id="phone" placeholder="Phone Number (e.g. 9876543210)">
    </div>
    <button onclick="continueToOTP()">CONTINUE</button>
    <div class="signup">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>
</div>

<script>
// ===== Particle Background =====
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
window.addEventListener("resize",()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0 || p.x>canvas.width) p.vx*=-1;
    if(p.y<0 || p.y>canvas.height) p.vy*=-1;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fillStyle="rgba(56,189,248,0.4)"; ctx.fill();
    for(let j=i;j<particles.length;j++){
      let dx=p.x-particles[j].x;
      let dy=p.y-particles[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle="rgba(123,108,255,0.15)"; ctx.stroke();
      }
    }
  });
  requestAnimationFrame(animate);
}
animate();

function continueToOTP(){
    const fname = document.getElementById("fname").value.trim();
    const lname = document.getElementById("lname").value.trim();
    const phone = document.getElementById("phone").value.trim();
    if(!fname || !lname || !phone){ alert("Please fill all fields"); return; }
    localStorage.setItem("fname",fname);
    localStorage.setItem("lname",lname);
    localStorage.setItem("phone", "+91"+phone);
    fetch("../../BACKEND/send_otp.php",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ phone_number: "+91"+phone })
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){ window.location.href="otp.html"; }
        else { alert(data.error); }
    })
    .catch(err=>{ console.error(err); alert("Server error"); });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CitizenConnect Officer Dashboard</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="officer.css">

    <!-- ❌ REMOVE Google Maps -->
    <!-- <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script> -->
</head>

<body>
<div class="app-container">

    <!-- Top Navigation -->
    <header class="top-nav">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i> CitizenConnect Admin
        </div>

        <nav class="top-menu">
            <a href="officer.html" class="active">Dashboard</a>
            <a href="officer-omplaints.html">Manage Complaints</a>
            <a href="officer-analytics.html">Analytics</a>
        </nav>

        <div class="top-right">
            <span id="currentTime">Loading...</span>
            <div class="user-profile-sm">
                <img src="https://i.pravatar.cc/150?img=11">
                <span id="navName">Loading...</span>
            </div>
        </div>
    </header>

    <div class="main-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="user-profile-lg">
                <img src="https://i.pravatar.cc/150?img=11">
                <h3 id="sideName">Loading...</h3>
                <p id="sideId">Loading...</p>
            </div>

            <nav class="side-menu">
                <a href="officer.html" class="active">Dashboard</a>
                <a href="officer-omplaints.html">Complaints</a>
                <a href="officer-analytics.html">Analytics</a>
                <a href="officer-workflow.html">Workflow</a>
                <a href="#" onclick="logoutOfficer()">Logout</a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="content-area">

            <!-- Welcome -->
            <h1 id="welcomeText">Welcome Officer</h1>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card"><h2 id="statNew">...</h2><p>New</p></div>
                <div class="stat-card"><h2 id="statProgress">...</h2><p>In Progress</p></div>
                <div class="stat-card"><h2 id="statOverdue">...</h2><p>Overdue</p></div>
                <div class="stat-card"><h2 id="statResolved">...</h2><p>Resolved</p></div>
            </div>

            <!-- Map -->
            <div class="card">
                <h3>Assignments Overview</h3>
                <div id="main-map" style="height:400px;"></div>
            </div>

            <!-- Complaints -->
            <div class="card">
                <h3>Recent Complaints</h3>
                <div id="complaints-list">
                    <p>Loading...</p>
                </div>
            </div>

            <!-- Chart -->
            <div class="card">
                <canvas id="dashboardChart"></canvas>
            </div>

        </main>
    </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="officer.js"></script>

</body>
</html>

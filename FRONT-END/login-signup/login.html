<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CivicTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #05061a;
    overflow: hidden;
    color: white;
}

#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

.container {
    width: 1000px;
    height: 600px;
    display: flex;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 20px rgba(56,189,248,0.2);
    border: 1px solid rgba(255,255,255,0.1);
}

.left {
    flex: 1.2;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(135deg, rgba(123,108,255,0.1), rgba(56,189,248,0.1));
    border-right: 1px solid rgba(255,255,255,0.1);
}

.left h1 { font-size:48px; margin-bottom:20px; font-weight:700; text-shadow: 0 0 20px rgba(123,108,255,0.8); }
.left p { font-size:16px; opacity:0.8; line-height:1.6; margin-bottom:40px; }

.right {
    flex: 1;
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right h2 { margin-bottom:30px; font-size:32px; text-align:center; color:#38bdf8; text-shadow: 0 0 10px rgba(56,189,248,0.4); }

.input-box { margin-bottom:25px; }
.input-box input {
    width: 100%;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    border-radius: 10px;
    transition: 0.3s;
}
.input-box input:focus { border-color:#38bdf8; background:rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(56,189,248,0.2); }

.remember { display:flex; justify-content:space-between; font-size:14px; margin-bottom:30px; color:#cbd5e1; }
.remember a { color:#38bdf8; text-decoration:none; }

button {
    width: 100%;
    padding: 16px;
    border: none;
    background: linear-gradient(45deg, #7b6cff, #38bdf8);
    color: white;
    font-weight: 700;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 5px 20px rgba(123,108,255,0.3);
}
button:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(56,189,248,0.5); }

.signup { text-align:center; margin-top:25px; font-size:14px; color:#94a3b8; }
.signup a { color:#38bdf8; text-decoration:none; font-weight:600; }

.social-login { display:flex; justify-content:center; gap:20px; margin-top:20px; }
.google-btn, .github-btn {
    display:inline-flex; align-items:center; gap:10px; padding:10px 20px; border-radius:10px; font-size:14px; cursor:pointer; transition:0.3s; border:1px solid rgba(255,255,255,0.1);
}
.google-btn { background:white; color:#333; }
.github-btn { background:#24292e; color:white; }
.google-btn img, .github-btn img { width:18px; height:18px; }
.github-btn img { filter:invert(1); }
.google-btn:hover, .github-btn:hover { transform:scale(1.05); }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
    <div class="left">
        <h1>Welcome Back</h1>
        <p>Your portal to a smarter city. Login to report issues, track progress, and contribute to your community's growth.</p>
        <div class="social-login">
            <div class="google-btn"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"><span>Google</span></div>
            <div class="github-btn"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg"><span>GitHub</span></div>
        </div>
    </div>

    <div class="right">
        <h2>Sign In</h2>
        <div class="input-box"><input type="email" id="email" placeholder="Email"></div>
        <div class="input-box"><input type="password" id="password" placeholder="Password"></div>
        <div class="remember">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
        </div>
        <button onclick="loginUser()">SIGN IN</button>
        <div class="signup">Don't have an account? <a href="signup.html">Sign Up</a></div>
    </div>
</div>

<script>
// ===== Particle Background =====
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
window.addEventListener("resize",()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0 || p.x>canvas.width) p.vx*=-1;
    if(p.y<0 || p.y>canvas.height) p.vy*=-1;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fillStyle="rgba(56,189,248,0.4)"; ctx.fill();
    for(let j=i;j<particles.length;j++){
      let dx=p.x-particles[j].x;
      let dy=p.y-particles[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle="rgba(123,108,255,0.15)"; ctx.stroke();
      }
    }
  });
  requestAnimationFrame(animate);
}
animate();

function loginUser(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    if(!email || !password){ alert("Please fill all fields"); return; }
    fetch("../../BACKEND/login.php",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:email, password:password})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success){
            alert("Login successful");
            localStorage.setItem("userRole", "citizen");
            if(data.user) {
                localStorage.setItem("userName", data.user.username);
                localStorage.setItem("userEmail", data.user.email);
            }
            window.location.href="../user-dashboard/user-Dashboard.html";
        }else{ alert(data.error); }
    })
    .catch(err=>{ console.error(err); alert("Server error"); });
}
</script>
</body>
</html>

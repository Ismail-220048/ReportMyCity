<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;background-size:cover;background-position:center;background-image:url("../asserts/sunset-sea.jpg");}
.container{width:900px;height:520px;display:flex;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);border-radius:15px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.6);}
.left{flex:1;padding:60px;color:white;display:flex;flex-direction:column;justify-content:center;}
.left h1{font-size:38px;margin-bottom:15px;}
.left p{font-size:14px;opacity:0.8;}
.right{flex:1;padding:50px;color:white;display:flex;flex-direction:column;justify-content:center;}
.right h2{margin-bottom:25px;}
.input-box{margin-bottom:18px;}
.input-box input{width:100%;padding:12px;border:none;border-bottom:2px solid white;background:transparent;color:white;outline:none;}
button{width:100%;padding:12px;border:none;background:#e11d48;color:white;font-weight:600;border-radius:5px;cursor:pointer;transition:.3s;}
button:hover{background:#be123c;}
.signup{text-align:center;margin-top:15px;font-size:14px;}
.signup a{color:#f43f5e;text-decoration:none;}
</style>
</head>
<body>

<div class="container">
  <div class="left">
    <h1>Almost Done</h1>
    <p>Your phone number has been verified. Create your CivicTrack account to start reporting civic issues.</p>
  </div>

  <div class="right">
    <h2>Create Account</h2>
    <div class="input-box"><input type="text" placeholder="Username"></div>
    <div class="input-box"><input type="email" placeholder="Email Address"></div>
    <div class="input-box"><input type="password" placeholder="Create Password"></div>
    <div class="input-box"><input type="password" placeholder="Confirm Password"></div>
    <button>Create Account</button>
    <div class="signup">Already have an account? <a href="login.html">Sign In</a></div>
  </div>
</div>

<script>
document.querySelector("button").addEventListener("click", function() {
    const inputs = document.querySelectorAll(".input-box input");
    const username = inputs[0].value.trim();
    const email    = inputs[1].value.trim();
    const password = inputs[2].value.trim();
    const confirm  = inputs[3].value.trim();

    if(!username || !email || !password || !confirm){
        alert("Please fill all fields"); return;
    }
    if(password !== confirm){
        alert("Passwords do not match"); return;
    }

    // Get previous signup data
    const fname = localStorage.getItem("fname");
    const lname = localStorage.getItem("lname");
    const phone = localStorage.getItem("phone");

    if(!fname || !phone){
        alert("Signup data missing. Please start again.");
        window.location.href="signup.html"; return;
    }

    // Send to backend signup.php
    fetch("../BACKEND/signup.php", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({first_name: fname, last_name: lname, phone_number: phone, username, email, password})
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            alert("Account created successfully!");
            localStorage.clear();
            window.location.href="login.html";
        } else {
            alert(data.error || "Signup failed");
        }
    })
    .catch(err => console.error(err));
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;background-size:cover;background-position:center;background-image:url("../asserts/sunset-sea.jpg");}
.container{width:400px;padding:50px;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);border-radius:15px;text-align:center;color:white;box-shadow:0 20px 40px rgba(0,0,0,0.6);}
h2{margin-bottom:10px;}
p{font-size:14px;opacity:.8;margin-bottom:30px;}
.otp-box{display:flex;justify-content:center;gap:10px;margin-bottom:25px;}
.otp-box input{width:50px;height:50px;border:none;border-radius:8px;text-align:center;font-size:20px;background:rgba(255,255,255,0.1);color:white;outline:none;}
button{width:100%;padding:12px;border:none;background:#e11d48;color:white;font-weight:600;border-radius:6px;cursor:pointer;transition:.3s;}
button:hover{background:#be123c;}
.resend{margin-top:15px;font-size:13px;}
.resend a{color:#f43f5e;text-decoration:none;}
</style>
</head>
<body>

<div class="container">
  <h2>OTP Verification</h2>
  <p>OTP sent to your phone</p>

  <div class="otp-box">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
    <input type="text" maxlength="1">
  </div>

  <button onclick="verifyOTP()">Verify OTP</button>

  <div class="resend">
    Didn't receive OTP? <a href="#" onclick="resendOTP()">Resend</a>
  </div>
</div>

<script>
function verifyOTP(){
    const otpInputs = document.querySelectorAll(".otp-box input");
    let otp = "";
    otpInputs.forEach(input => otp += input.value);

    if(otp.length < 4){
        alert("Enter complete OTP");
        return;
    }

    const phone = localStorage.getItem("phone");
    if(!phone){
        alert("Phone not found. Please sign up again.");
        window.location.href = "signup.html";
        return;
    }

    fetch("../BACKEND/verify_otp.php", {
        method:"POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({phone_number: phone, otp: otp})
    })
    .then(res => res.json())
    .then(data => {
        if(data.success){
            window.location.href = "create-account.html";
        } else {
            alert(data.error || "OTP verification failed");
        }
    })
    .catch(err => console.error(err));
}

function resendOTP(){
    const phone = localStorage.getItem("phone");
    if(!phone) return alert("Phone not found");
    fetch("../BACKEND/send_otp.php", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({phone_number: phone})
    })
    .then(res => res.json())
    .then(data => alert(data.success ? "OTP Sent Again" : data.error));
}
</script>

</body>
</html>

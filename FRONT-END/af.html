<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer/Admin Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ======= Global ======= */
* { box-sizing:border-box; font-family:'Poppins',sans-serif; margin:0; padding:0; }
body { 
    background: #05061a; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    overflow: hidden;
    color: white;
}

/* Back Particles (Simulated with CSS for performance if JS not preferred, but let's use the landing page script later) */
#bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* ======= Container ======= */
.container { 
    background: rgba(255, 255, 255, 0.03); 
    backdrop-filter: blur(20px);
    border-radius: 20px; 
    padding: 50px; 
    width: 900px; 
    max-width: 95%; 
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(123, 108, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
    z-index: 10;
}
h2 { 
    text-align: center; 
    margin-bottom: 40px; 
    color: #fff; 
    font-size: 32px;
    letter-spacing: 2px;
    text-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
}

/* ======= Tabs ======= */
.tabs { display: flex; justify-content: center; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.tabs button { 
    background: transparent; 
    border: none; 
    padding: 15px 40px; 
    margin: 0 5px; 
    cursor: pointer; 
    font-weight: 600; 
    transition: 0.4s; 
    color: #aaa;
    border-bottom: 3px solid transparent;
}
.tabs button.active { 
    color: #38bdf8;
    border-bottom-color: #38bdf8;
    text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
}

/* ======= Forms ======= */
form { display: none; width: 100%; }
form.active { display: block; animation: fadeIn 0.5s ease; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

form label { font-weight: 500; margin-bottom: 8px; display: block; color: #cbd5e1; }
form input, form select { 
    width: 100%; 
    padding: 14px 18px; 
    border-radius: 10px; 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    background: rgba(255, 255, 255, 0.05);
    color: white;
    font-size: 16px; 
    outline: none; 
    transition: 0.3s; 
    margin-bottom: 25px; 
}
form input:focus, form select:focus { 
    border-color: #38bdf8; 
    box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
    background: rgba(255, 255, 255, 0.1);
}

/* Select options styling for dark theme visibility */
select option {
    background: #05061a;
    color: white;
}

/* ======= Two Columns ======= */
.signup-columns { display: flex; gap: 40px; flex-wrap: wrap; margin-bottom: 30px; }
.column { flex: 1; min-width: 250px; display: flex; flex-direction: column; }

/* ======= Button ======= */
.btn { 
    width: 100%; 
    padding: 16px; 
    background: linear-gradient(45deg, #7b6cff, #38bdf8); 
    color: white; 
    font-size: 18px; 
    font-weight: 700; 
    border: none; 
    border-radius: 12px; 
    cursor: pointer; 
    transition: 0.4s; 
    box-shadow: 0 5px 20px rgba(123, 108, 255, 0.4);
}
.btn:hover { 
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 30px rgba(56, 189, 248, 0.6);
}

/* ======= Login Form Centered ======= */
#loginForm { max-width: 450px; margin: 0 auto; }

/* ======= Demo Credentials ======= */
.demo-section {
    background: rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(56, 189, 248, 0.3);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 30px;
    text-align: center;
}

.demo-section h3 {
    color: #38bdf8;
    margin-bottom: 12px;
    font-size: 16px;
    text-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
}

.demo-credentials {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 15px;
    font-size: 13px;
}

.cred-box {
    background: rgba(0, 0, 0, 0.3);
    padding: 12px;
    border-radius: 8px;
    border: 1px solid rgba(56, 189, 248, 0.2);
}

.cred-box strong {
    color: #38bdf8;
    display: block;
    margin-bottom: 8px;
}

.cred-item {
    color: #cbd5e1;
    margin: 4px 0;
}

.demo-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.demo-btn {
    padding: 10px 15px;
    background: rgba(56, 189, 248, 0.2);
    border: 1px solid rgba(56, 189, 248, 0.5);
    color: #38bdf8;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: 0.3s;
}

.demo-btn:hover {
    background: rgba(56, 189, 248, 0.3);
    border-color: #38bdf8;
}

/* Responsive */
@media(max-width:700px){ 
    .signup-columns { flex-direction:column; gap:20px; }
    .demo-credentials { grid-template-columns: 1fr; }
    .demo-buttons { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="container">
  <h2>Official Console</h2>
  
  <!-- Tabs -->
  <div class="tabs">
    <button id="loginTab" class="active" onclick="showTab('login')">LOGIN</button>
    <button id="signupTab" onclick="showTab('signup')">ENROLL</button>
  </div>

  <!-- ===== LOGIN FORM ===== -->
  <!-- Demo Credentials Section -->
  <div id="demoSection" class="demo-section" style="display:none;">
    <h3>🔑 Demo Credentials</h3>
    <div class="demo-credentials">
      <div class="cred-box">
        <strong>ADMIN</strong>
        <div class="cred-item">📧 admin@civictrack.com</div>
        <div class="cred-item">🔒 admin123</div>
      </div>
      <div class="cred-box">
        <strong>OFFICER</strong>
        <div class="cred-item">📧 officer@civictrack.com</div>
        <div class="cred-item">🔒 officer123</div>
      </div>
    </div>
    <div class="demo-buttons">
      <button type="button" class="demo-btn" onclick="demoLogin('admin')">Try Admin</button>
      <button type="button" class="demo-btn" onclick="demoLogin('officer')">Try Officer</button>
    </div>
  </div>

  <form id="loginForm" class="active">
    <label for="loginEmail">Email</label>
    <input type="email" id="loginEmail" placeholder="Enter email" required>

    <label for="loginPassword">Password</label>
    <input type="password" id="loginPassword" placeholder="Enter password" required>

    <label for="loginRole">Role</label>
    <select id="loginRole" required>
      <option value="">Select Role</option>
      <option value="admin">Admin</option>
      <option value="officer">Officer</option>
    </select>

    <button type="submit" class="btn">Login</button>
  </form>

  <!-- ===== SIGNUP FORM ===== -->
  <form id="signupForm">
    <div class="signup-columns">
      <!-- Column 1 -->
      <div class="column">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter phone number" required>
      </div>

      <!-- Column 2 -->
      <div class="column">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>

        <label for="role">Role</label>
        <select id="role" onchange="handleRoleChange()" required>
          <option value="">Select Role</option>
          <option value="admin">Admin</option>
          <option value="officer">Officer</option>
        </select>

        <label id="dynamicLabel" for="dynamicSelect">Category / District</label>
        <select id="dynamicSelect" required>
          <option value="">Select</option>
        </select>
      </div>
    </div>

    <button type="submit" class="btn">Sign Up</button>
  </form>
</div>

<script>
// ===== Check PHP Server on Page Load =====
window.addEventListener('DOMContentLoaded', function() {
    // Test if PHP server is running
    fetch("../BACKEND/test.php")
        .then(res => res.json())
        .then(data => {
            console.log("✅ PHP Server is running!", data);
        })
        .catch(err => {
            console.error("❌ PHP Server ERROR:", err.message);
            alert("⚠️ ERROR: PHP Server is not running!\n\nPlease run this command in PowerShell:\nphp -S localhost:8000\n\nThen refresh this page.");
        });
});

// ===== Tab Toggle =====
function showTab(tab){
    if(tab==='login'){
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('signupForm').classList.remove('active');
        document.getElementById('loginTab').classList.add('active');
        document.getElementById('signupTab').classList.remove('active');
        document.getElementById('demoSection').style.display = 'block';
    } else {
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('signupForm').classList.add('active');
        document.getElementById('loginTab').classList.remove('active');
        document.getElementById('signupTab').classList.add('active');
        document.getElementById('demoSection').style.display = 'none';
    }
}

// ===== Demo Login Function =====
function demoLogin(role) {
    const credentials = {
        'admin': { email: 'admin@civictrack.com', password: 'admin123' },
        'officer': { email: 'officer@civictrack.com', password: 'officer123' }
    };

    if (credentials[role]) {
        document.getElementById('loginEmail').value = credentials[role].email;
        document.getElementById('loginPassword').value = credentials[role].password;
        document.getElementById('loginRole').value = role;
        
        // Auto-submit after a short delay for UX
        setTimeout(() => {
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }, 300);
    }
}

// ===== Role-Based Dynamic Dropdown =====
const officerCategories = ["Road Damage","Water Leak","Street Light","Garbage","Noise"];
const districts = ["Anantapur","Chittoor","East Godavari","Guntur","Kadapa","Krishna","Kurnool","Nellore","Prakasam","Srikakulam","Visakhapatnam","Vizianagaram","West Godavari"];

function handleRoleChange(){
    const role = document.getElementById("role").value;
    const dynamicSelect = document.getElementById("dynamicSelect");
    const dynamicLabel = document.getElementById("dynamicLabel");

    dynamicSelect.innerHTML = "<option value=''>Select</option>";

    if(role==="officer"){
        dynamicLabel.innerText = "Category";
        officerCategories.forEach(cat => {
            let option = document.createElement("option");
            option.value = cat; option.text = cat;
            dynamicSelect.add(option);
        });
    } else if(role==="admin"){
        dynamicLabel.innerText = "District";
        districts.forEach(dist => {
            let option = document.createElement("option");
            option.value = dist; option.text = dist;
            dynamicSelect.add(option);
        });
    } else {
        dynamicLabel.innerText = "Category / District";
    }
}

// ===== LOGIN SUBMISSION =====
document.getElementById("loginForm").addEventListener("submit", e=>{
    e.preventDefault();
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;
    const role = document.getElementById("loginRole").value;

    if (!email || !password || !role) {
        alert("Please fill in all fields");
        return;
    }

    console.log("Login attempt:", { email, role });

    fetch("../BACKEND/af-login.php", {
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:`email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&role=${encodeURIComponent(role)}`
    })
    .then(res=>{
        console.log("Response status:", res.status);
        return res.text();
    })
    .then(text=>{
        console.log("Response text:", text);
        try {
            const data = JSON.parse(text);
            console.log("Parsed data:", data);
            
            if(data.status==="success"){
                console.log("Login successful, redirecting...");
                // Store session info
                localStorage.setItem("userRole", role);
                localStorage.setItem("userName", data.name);
                localStorage.setItem("userId", data.user_id);
                
                // Redirect path
                const redirectPath = (role==="admin") ? "admin_dashboard/admin-dashborad.html" : "officer-dashboard/officer.html";
                console.log("Redirecting to:", redirectPath);
                
                // Use setTimeout to ensure localStorage is saved before redirect
                setTimeout(() => {
                    window.location.href = redirectPath;
                }, 500);
            } else {
                alert(data.message || "Login failed");
            }
        } catch(parseErr) {
            console.error("JSON parsing error:", parseErr);
            alert("Server error: " + text);
        }
    })
    .catch(err=>{
        console.error("Fetch error:", err);
        alert("Network error: " + err.message);
    });
});

// ===== SIGNUP SUBMISSION =====
document.getElementById("signupForm").addEventListener("submit", e => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;
    const dynamic = document.getElementById("dynamicSelect").value;

    if(!name || !email || !phone || !password || !role || !dynamic){
        alert("All fields are required!");
        return;
    }

    // If all fields filled, send data to PHP
    const formData = new FormData();
    formData.append("name", name);
    formData.append("email", email);
    formData.append("phone", phone);
    formData.append("password", password);
    formData.append("role", role);
    formData.append("dynamicSelect", dynamic); // backend expects dynamicSelect

    fetch("../BACKEND/af-signup.php", {
        method: "POST",
        body: formData
    }).then(res => res.json())
      .then(data => {
          alert(data.message);
          if(data.status === "success"){
              // redirect to login
              showTab('login');
          }
      });
});
// ===== Particle Background =====
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];
const mouse={x:null,y:null};
window.addEventListener("mousemove",(e)=>{ mouse.x=e.x; mouse.y=e.y; });
window.addEventListener("resize",()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0 || p.x>canvas.width) p.vx*=-1;
    if(p.y<0 || p.y>canvas.height) p.vy*=-1;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fillStyle="rgba(56,189,248,0.5)"; ctx.fill();
    for(let j=i;j<particles.length;j++){
      let dx=p.x-particles[j].x;
      let dy=p.y-particles[j].y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle="rgba(123,108,255,0.15)"; ctx.stroke();
      }
    }
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
